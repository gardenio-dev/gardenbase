name: Build and Push

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - 'logo.png'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - 'logo.png'
  workflow_dispatch:
    inputs:
      profile:
        description: "Build profile (filename without .env)"
        required: true
        default: "pg17-postgis3.5"

env:
  DEFAULT_PROFILE: pg17-postgis3.5

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load profile
        run: |
          PROFILE="${{ github.event.inputs.profile || env.DEFAULT_PROFILE }}"
          echo "Loading profile: ${PROFILE}"
          source "profiles/${PROFILE}.env"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "UBUNTU=${UBUNTU}" >> "$GITHUB_ENV"
          echo "GEOS=${GEOS}" >> "$GITHUB_ENV"
          echo "GDAL=${GDAL}" >> "$GITHUB_ENV"
          echo "PROJ=${PROJ}" >> "$GITHUB_ENV"
          echo "POSTGRES=${POSTGRES}" >> "$GITHUB_ENV"
          echo "POSTGIS=${POSTGIS}" >> "$GITHUB_ENV"
          echo "PGROUTING=${PGROUTING}" >> "$GITHUB_ENV"
          echo "PYTHON=${PYTHON}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          PG_MAJOR="${POSTGRES%%.*}"
          POSTGIS_MAJOR="${POSTGIS%.*}"
          TAGS="gardenio/gardenbase:${VERSION}"
          TAGS="${TAGS},gardenio/gardenbase:pg${PG_MAJOR}-postgis${POSTGIS_MAJOR}"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAGS="${TAGS},gardenio/gardenbase:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            UBUNTU=${{ env.UBUNTU }}
            GEOS=${{ env.GEOS }}
            GDAL=${{ env.GDAL }}
            PROJ=${{ env.PROJ }}
            POSTGRES=${{ env.POSTGRES }}
            POSTGIS=${{ env.POSTGIS }}
            PGROUTING=${{ env.PGROUTING }}
            PYTHON=${{ env.PYTHON }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update DockerHub description
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: gardenio/gardenbase
          short-description: "PostGIS image built from source for the GardenIO project"
          readme-filepath: ./README.md
